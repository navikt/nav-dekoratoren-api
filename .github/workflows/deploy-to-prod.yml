name: Deploy to prod
on:
  push:
    branches:
      - main

env:
  ENVIRONMENT: prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Build and deploy prod
        uses: ./.github/actions/build-and-deploy
        with:
          ENVIRONMENT: ${{ env.ENVIRONMENT }}

      - name: Deploy HPA
        uses: nais/deploy/actions/deploy@v2
        timeout-minutes: 1
        continue-on-error: true
        env:
          CLUSTER: ${{ env.ENVIRONMENT }}-gcp
          RESOURCE: ./nais/hpa.yaml
          VARS: ./nais/${{ env.ENVIRONMENT }}-gcp/personbruker.json

  release:
    name: Create a new release
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Generate unique tag name
        run: echo "TAG_NAME=$(date +%s)" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          target_commitish: main
          tag_name: release/${{ env.ENVIRONMENT }}@${{ env.TAG_NAME }} # Generates a unique tag using timestamp
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }} # This is a PAT with repo permissions
